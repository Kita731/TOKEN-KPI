<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOKEN KPI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f18; --card: #141720; --border: #252840;
      --text: #dde2f0; --muted: #5a6488; --accent: #7c6af7;
      --pass: #4ade80; --warn: #fbbf24; --fail: #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; }
    a { color: var(--accent); text-decoration: none; }

    nav { background: var(--card); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1.25rem; position: sticky; top: 0; z-index: 100; }
    .brand { font-weight: 700; font-size: 1rem; color: var(--accent); letter-spacing: .04em; white-space: nowrap; }
    .nav-links { display: flex; gap: .2rem; flex: 1; }
    .nav-links a { padding: .4rem .7rem; border-radius: 6px; font-size: .875rem; color: var(--muted); transition: all .15s; display: flex; align-items: center; gap: .35rem; }
    .nav-links a:hover, .nav-links a.active { background: #1e2235; color: var(--text); }
    .nav-end { display: flex; gap: .4rem; margin-left: auto; }
    .btn { display: inline-flex; align-items: center; gap: .35rem; padding: .4rem .8rem; border-radius: 7px; font-size: .8rem; border: 1px solid transparent; cursor: pointer; font-weight: 500; transition: all .15s; background: transparent; }
    .btn-ghost { color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); background: #1e2235; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #6b58e8; }
    .btn-lang { color: var(--muted); border-color: var(--border); font-weight: 600; min-width: 36px; justify-content: center; }
    .btn-lang:hover { color: var(--accent); border-color: var(--accent); background: #7c6af710; }

    .page { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .card-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .5rem; }
    .metric-big { font-size: 2.4rem; font-weight: 700; line-height: 1; }
    .pill { display: inline-block; font-size: .68rem; padding: .2rem .55rem; border-radius: 999px; font-weight: 600; }
    .pill-pass { background: #16a34a18; color: var(--pass); border: 1px solid #16a34a30; }
    .pill-warn { background: #ca8a0418; color: var(--warn); border: 1px solid #ca8a0430; }
    .pill-fail { background: #dc262618; color: var(--fail); border: 1px solid #dc262630; }
    .ti-up { color: var(--pass); } .ti-down { color: var(--fail); } .ti-stable { color: var(--muted); }

    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .col-4 { flex: 1 1 calc(25% - .75rem); min-width: 180px; }
    .sec { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .9rem; }

    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; padding: .55rem .75rem; border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: .6rem .75rem; border-bottom: 1px solid #161828; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #161828; }

    select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: .3rem .6rem; border-radius: 6px; font-size: .8rem; cursor: pointer; outline: none; }
    select:focus { border-color: var(--accent); }

    .flash { background: #16a34a18; border: 1px solid #16a34a30; color: var(--pass); padding: .7rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .875rem; display: flex; align-items: center; gap: .5rem; }
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
    .empty-state .big { font-size: 2.5rem; margin-bottom: .5rem; }
    .auto-tag { display:inline-block; background:#7c6af730; color:#a89cf7; font-size:.6rem; padding:.1rem .4rem; border-radius:3px; font-weight:700; letter-spacing:.04em; vertical-align:middle; margin-right:.3rem; }
    .pending-tag { display:inline-block; background:#ca8a0418; color:var(--warn); font-size:.6rem; padding:.1rem .4rem; border-radius:3px; font-weight:700; letter-spacing:.04em; }
    /* TCR quick-fill popover */
    .tcr-form { display:none; position:absolute; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:.75rem; z-index:50; box-shadow:0 8px 24px #00000060; min-width:220px; }
    .tcr-form.open { display:block; }
    .tcr-form label { font-size:.72rem; color:var(--muted); display:block; margin-bottom:.3rem; }
    .tcr-form input { width:100%; background:#0d0f18; border:1px solid var(--border); color:var(--text); padding:.35rem .5rem; border-radius:6px; font-size:.8rem; outline:none; }
    .tcr-form input:focus { border-color:var(--accent); }
    .tcr-row { display:flex; gap:.4rem; margin-top:.5rem; }
    td { position:relative; }

    /* Import Modal */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: #00000090; z-index: 200; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 400px; max-width: 92vw; }
    .modal-title { font-weight: 600; margin-bottom: 1.1rem; }
    .form-group { margin-bottom: .9rem; }
    .form-group label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: .35rem; }
    .form-group select, .form-group input[type=file] { width: 100%; font-size: .85rem; color: var(--text); }
    .form-note { font-size: .73rem; color: var(--muted); margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; }

    .metric-info-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:.8rem; padding:0 0 0 .3rem; vertical-align:middle; transition:color .15s; line-height:1; }
    .metric-info-btn:hover { color:var(--accent); }
    #metric-tip { display:none; position:fixed; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:.9rem 1rem; max-width:340px; font-size:.78rem; line-height:1.6; z-index:500; box-shadow:0 8px 32px #00000080; white-space:pre-line; color:var(--text); }

    @media (max-width: 640px) {
      .col-4 { flex: 1 1 calc(50% - .5rem); }
      .nav-links a span { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <span class="brand"><i class="bi bi-graph-up-arrow"></i> TOKEN KPI</span>
  <div class="nav-links">
    <a href="index.html" class="active"><i class="bi bi-speedometer2"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
    <a href="log.html"><i class="bi bi-plus-circle"></i><span data-i18n="nav.log">記錄</span></a>
    <a href="weekly.html"><i class="bi bi-calendar-week"></i><span data-i18n="nav.weekly">週報</span></a>
  </div>
  <div class="nav-end">
    <button class="btn btn-ghost" onclick="openImport()"><i class="bi bi-upload"></i><span data-i18n="nav.import">匯入</span></button>
    <button class="btn btn-ghost" onclick="KPI.exportCSV('sessions')"><i class="bi bi-download"></i><span data-i18n="nav.export">匯出</span></button>
    <button class="btn btn-lang" onclick="I18N.toggleLang()" title="Switch Language"><span data-i18n="nav.lang">EN</span></button>
  </div>
</nav>

<div class="page">
  <div id="flash"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <h1 style="font-size:1.25rem;font-weight:700;margin:0" data-i18n="dash.title">Dashboard</h1>
    <div style="display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--muted)">
      <span data-i18n="dash.last">近</span>
      <select id="windowSel" onchange="refresh()">
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="30">30</option>
      </select>
      <span data-i18n="dash.sessions">筆 sessions</span>
    </div>
  </div>

  <!-- Health Cards -->
  <div class="row" style="margin-bottom:1rem">
    <div class="col-4 card">
      <div class="card-label"><span data-i18n="metric.tcr.label">TCR — Task Completion Rate</span><button class="metric-info-btn" data-desc-key="desc.tcr" onclick="toggleMetricTip(this)">ⓘ</button></div>
      <div style="display:flex;align-items:flex-end;gap:.5rem;margin-bottom:.4rem">
        <div class="metric-big" id="v-tcr">—</div>
        <div id="t-tcr" style="margin-bottom:.25rem"></div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="pill" id="b-tcr">—</span>
        <span style="font-size:.68rem;color:var(--muted)" data-i18n="metric.tcr.target">目標 > 70%</span>
      </div>
    </div>
    <div class="col-4 card">
      <div class="card-label"><span data-i18n="metric.ic.label">IC — Iteration Count</span><button class="metric-info-btn" data-desc-key="desc.ic" onclick="toggleMetricTip(this)">ⓘ</button></div>
      <div style="display:flex;align-items:flex-end;gap:.5rem;margin-bottom:.4rem">
        <div class="metric-big" id="v-ic">—</div>
        <div id="t-ic" style="margin-bottom:.25rem"></div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="pill" id="b-ic">—</span>
        <span style="font-size:.68rem;color:var(--muted)" data-i18n="metric.ic.target">目標 < 3</span>
      </div>
    </div>
    <div class="col-4 card">
      <div class="card-label"><span data-i18n="metric.car.label">CAR — Code Acceptance Rate</span><button class="metric-info-btn" data-desc-key="desc.car" onclick="toggleMetricTip(this)">ⓘ</button></div>
      <div style="display:flex;align-items:flex-end;gap:.5rem;margin-bottom:.4rem">
        <div class="metric-big" id="v-car">—</div>
        <div id="t-car" style="margin-bottom:.25rem"></div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="pill" id="b-car">—</span>
        <span style="font-size:.68rem;color:var(--muted)" data-i18n="metric.car.target">目標 > 60%</span>
      </div>
    </div>
    <div class="col-4 card">
      <div class="card-label"><span data-i18n="metric.ttwc.label">TTWC — Time-to-Working-Code</span><button class="metric-info-btn" data-desc-key="desc.ttwc" onclick="toggleMetricTip(this)">ⓘ</button></div>
      <div style="display:flex;align-items:flex-end;gap:.5rem;margin-bottom:.4rem">
        <div class="metric-big" id="v-ttwc">—</div>
        <div id="t-ttwc" style="margin-bottom:.25rem"></div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="pill" id="b-ttwc">—</span>
        <span style="font-size:.68rem;color:var(--muted)" data-i18n="metric.ttwc.target">目標 < 50%</span>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card" style="margin-bottom:1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="sec" style="margin-bottom:0" data-i18n="dash.trend">趨勢圖</div>
      <div style="display:flex;gap:.85rem;font-size:.73rem;color:var(--muted)">
        <span><span style="display:inline-block;width:9px;height:9px;background:#7c6af7;border-radius:2px;margin-right:.3rem"></span>TCR</span>
        <span><span style="display:inline-block;width:9px;height:9px;background:#f59e0b;border-radius:2px;margin-right:.3rem"></span>IC</span>
        <span><span style="display:inline-block;width:9px;height:9px;background:#10b981;border-radius:2px;margin-right:.3rem"></span>CAR</span>
        <span><span style="display:inline-block;width:9px;height:9px;background:#f87171;border-radius:2px;margin-right:.3rem"></span>TTWC</span>
      </div>
    </div>
    <canvas id="chart" height="80"></canvas>
  </div>

  <!-- Sessions Table -->
  <div class="card">
    <div class="sec" data-i18n="dash.recent">最近 Sessions</div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th data-i18n="dash.col.date">日期</th>
            <th data-i18n="dash.col.project">專案</th>
            <th>TCR</th><th>IC</th><th>CAR</th><th>TTWC</th>
            <th data-i18n="dash.col.notes">備註</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sessionBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-backdrop" id="importModal">
  <div class="modal">
    <div class="modal-title" data-i18n="dash.import.title">匯入 CSV 資料</div>
    <div class="form-group">
      <label data-i18n="dash.import.type">資料類型</label>
      <select id="importType">
        <option value="sessions" data-i18n="dash.opt.sessions">Sessions（核心指標）</option>
        <option value="weekly"   data-i18n="dash.opt.weekly">Weekly（週報）</option>
        <option value="pge"      data-i18n="dash.opt.pge">PGE（流程指標）</option>
      </select>
    </div>
    <div class="form-group">
      <label data-i18n="dash.import.file">選擇 CSV 檔案</label>
      <input type="file" id="importFile" accept=".csv">
    </div>
    <div class="form-note" data-i18n="dash.import.note">重複的 session_id 不會被匯入（merge 模式）</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeImport()" data-i18n="dash.import.cancel">取消</button>
      <button class="btn btn-primary" onclick="doImport()"><i class="bi bi-upload"></i> <span data-i18n="dash.import.btn">匯入</span></button>
    </div>
  </div>
</div>

<div id="metric-tip"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/kpi.js"></script>
<script src="js/i18n.js"></script>
<script>
let chart = null;

const pillClass = { pass: 'pill-pass', warn: 'pill-warn', fail: 'pill-fail' };
const trendHTML = {
  up:     '<i class="bi bi-arrow-up ti-up"    style="font-size:.9rem"></i>',
  down:   '<i class="bi bi-arrow-down ti-down" style="font-size:.9rem"></i>',
  stable: '<i class="bi bi-dash ti-stable"    style="font-size:.9rem"></i>',
};

let activeTipBtn = null;
function toggleMetricTip(btn) {
  const tip = document.getElementById('metric-tip');
  if (activeTipBtn === btn) { tip.style.display = 'none'; activeTipBtn = null; return; }
  tip.textContent = I18N.t(btn.dataset.descKey);
  tip.style.display = 'block';
  const rect = btn.getBoundingClientRect();
  tip.style.left = Math.min(rect.left, window.innerWidth - 360) + 'px';
  tip.style.top  = (rect.bottom + 8) + 'px';
  activeTipBtn = btn;
}
document.addEventListener('click', e => {
  if (activeTipBtn && !e.target.closest('#metric-tip') && !e.target.closest('.metric-info-btn')) {
    document.getElementById('metric-tip').style.display = 'none';
    activeTipBtn = null;
  }
});

function onLangChange() {
  if (activeTipBtn) document.getElementById('metric-tip').textContent = I18N.t(activeTipBtn.dataset.descKey);
  refresh();
}

function loadHealth(n) {
  const data = KPI.getHealth(n);
  const conf = { tcr:[true,false], ic:[false,true], car:[true,false], ttwc:[true,true] };
  for (const [key, [isPct]] of Object.entries(conf)) {
    const m = data.metrics[key];
    if (!m) continue;
    document.getElementById(`v-${key}`).textContent = isPct ? (m.value*100).toFixed(1)+'%' : m.value.toFixed(1);
    const b = document.getElementById(`b-${key}`);
    b.className = `pill ${pillClass[m.status]}`;
    b.textContent = I18N.t(`status.${m.status}`);
    document.getElementById(`t-${key}`).innerHTML = trendHTML[m.trend] || '';
  }
}

function loadChart(n) {
  const d = KPI.getTrends(n);
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: d.labels,
      datasets: [
        { label:'TCR',  data: d.datasets.tcr.map(v=>(v*100).toFixed(1)),        borderColor:'#7c6af7', tension:.35, pointRadius:3, fill:false },
        { label:'IC',   data: d.datasets.ic,                                      borderColor:'#f59e0b', tension:.35, pointRadius:3, fill:false, yAxisID:'y2' },
        { label:'CAR',  data: d.datasets.car.map(v=>(v*100).toFixed(1)),         borderColor:'#10b981', tension:.35, pointRadius:3, fill:false },
        { label:'TTWC', data: d.datasets.ttwc_ratio.map(v=>(v*100).toFixed(1)), borderColor:'#f87171', tension:.35, pointRadius:3, fill:false },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: { legend:{ display:false } },
      scales: {
        x:  { ticks:{color:'#5a6488',font:{size:11}}, grid:{color:'#161828'} },
        y:  { ticks:{color:'#5a6488',callback:v=>v+'%'}, grid:{color:'#161828'}, min:0, max:100 },
        y2: { position:'right', ticks:{color:'#f59e0b',font:{size:11}}, grid:{display:false}, min:0, max:10,
              title:{display:true,text:'IC',color:'#f59e0b',font:{size:11}} },
      },
    },
  });
}

function rowColor(val, target, invert) {
  if (val === '' || val === null || isNaN(+val)) return 'color:var(--muted)';
  return (invert ? +val <= target : +val >= target) ? '' : 'color:var(--fail)';
}

function fmtPct(v) { return (v === '' || v === null || v === undefined) ? '<span style="color:var(--muted)">—</span>' : (v*100).toFixed(0)+'%'; }
function fmtNum(v) { return (v === '' || v === null || v === undefined) ? '<span style="color:var(--muted)">—</span>' : (+v).toFixed(1); }

let openTcrForm = null;

function closeTcrForms() {
  document.querySelectorAll('.tcr-form').forEach(el => el.classList.remove('open'));
  openTcrForm = null;
}

function toggleTcr(sid) {
  const el = document.getElementById('tcr-'+sid);
  if (!el) return;
  if (el.classList.contains('open')) { closeTcrForms(); return; }
  closeTcrForms();
  el.classList.add('open');
  openTcrForm = sid;
  el.querySelector('.tcr-total').focus();
}

function saveTcr(sid) {
  const total  = parseInt(document.getElementById('tcr-'+sid).querySelector('.tcr-total').value);
  const passed = parseInt(document.getElementById('tcr-'+sid).querySelector('.tcr-passed').value);
  if (isNaN(total) || isNaN(passed)) return;
  const sessions = KPI.getSessions();
  const idx = sessions.findIndex(s => s.session_id === sid);
  if (idx === -1) return;
  sessions[idx].total_tasks      = total;
  sessions[idx].passed_first_try = passed;
  sessions[idx].tcr              = KPI.round(passed / total);
  localStorage.setItem('kpi_sessions', JSON.stringify(sessions));
  closeTcrForms();
  refresh();
}

document.addEventListener('click', e => {
  if (openTcrForm && !e.target.closest('.tcr-form') && !e.target.closest('.tcr-btn')) closeTcrForms();
});

function loadTable(n) {
  const sessions = KPI.getSessions().slice(-n).reverse();
  const tbody = document.getElementById('sessionBody');
  if (!sessions.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <div class="big">📊</div>
      <div>${I18N.t('dash.empty.text')}</div>
      <br><a href="log.html" style="color:var(--accent)">${I18N.t('dash.empty.cta')}</a>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = sessions.map(r => {
    const isAuto    = (r.notes || '').includes('[auto]');
    const missingTcr = r.tcr === '' || r.tcr === null || r.tcr === undefined;
    const sid = r.session_id;

    const tcrCell = missingTcr
      ? `<span class="pending-tag">?</span>
         <button class="btn btn-ghost tcr-btn" style="padding:.15rem .4rem;font-size:.7rem;margin-left:.2rem" onclick="toggleTcr('${sid}')">
           <i class="bi bi-pencil"></i>
         </button>
         <div class="tcr-form" id="tcr-${sid}">
           <label>${I18N.lang==='zh'?'填入 TCR':'Enter TCR'}</label>
           <div style="display:flex;gap:.4rem;margin-bottom:.4rem">
             <input class="tcr-total"  type="number" min="1" placeholder="${I18N.lang==='zh'?'總任務':'Total'}" style="width:50%">
             <input class="tcr-passed" type="number" min="0" placeholder="${I18N.lang==='zh'?'通過':'Passed'}" style="width:50%">
           </div>
           <div class="tcr-row">
             <button class="btn btn-primary" style="font-size:.75rem;padding:.3rem .6rem;flex:1" onclick="saveTcr('${sid}')">
               <i class="bi bi-check"></i> OK
             </button>
             <button class="btn btn-ghost" style="font-size:.75rem;padding:.3rem .6rem" onclick="closeTcrForms()">✕</button>
           </div>
         </div>`
      : `<span style="${rowColor(r.tcr,.7,false)}">${fmtPct(+r.tcr)}</span>`;

    return `<tr>
      <td style="white-space:nowrap;font-size:.8rem;color:var(--muted)">${r.date}</td>
      <td>
        ${isAuto ? '<span class="auto-tag">AUTO</span>' : ''}
        ${r.project || '<span style="color:var(--muted)">—</span>'}
      </td>
      <td>${tcrCell}</td>
      <td style="${rowColor(r.ic,3,true)}">${fmtNum(r.ic)}</td>
      <td style="${rowColor(r.car,.6,false)}">${fmtPct(r.car === ''?null:+r.car)}</td>
      <td style="${rowColor(r.ttwc_ratio,.5,true)}">${fmtPct(r.ttwc_ratio===''?null:+r.ttwc_ratio)}</td>
      <td style="color:var(--muted);font-size:.78rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.notes||'').replace('[auto]','').trim()}</td>
      <td><button class="btn btn-ghost" style="padding:.2rem .45rem;font-size:.72rem" onclick="delSession('${sid}')"><i class="bi bi-trash3"></i></button></td>
    </tr>`;
  }).join('');
}

function delSession(id) {
  if (!confirm(I18N.lang === 'zh' ? '刪除這筆 session？' : 'Delete this session?')) return;
  KPI.deleteSession(id);
  refresh();
}

function refresh() {
  const n = +document.getElementById('windowSel').value;
  loadHealth(n);
  loadChart(n);
  loadTable(n);
  I18N.applyAll();
}

function openImport()  { document.getElementById('importModal').classList.add('open'); }
function closeImport() { document.getElementById('importModal').classList.remove('open'); }

async function doImport() {
  const file = document.getElementById('importFile').files[0];
  if (!file) { alert(I18N.lang==='zh'?'請選擇 CSV 檔案':'Please select a CSV file'); return; }
  try {
    const r = await KPI.importCSV(file, document.getElementById('importType').value);
    closeImport();
    const f = document.getElementById('flash');
    const msg = I18N.lang === 'zh'
      ? `成功匯入 ${r.added} 筆（共 ${r.total} 筆，略過重複）`
      : `Imported ${r.added} rows (${r.total} total, duplicates skipped)`;
    f.innerHTML = `<div class="flash"><i class="bi bi-check-circle"></i> ${msg}</div>`;
    setTimeout(() => f.innerHTML='', 4000);
    refresh();
  } catch(e) { alert('Error: '+e.message); }
}

// Flash from log page
const msg = sessionStorage.getItem('kpi_flash');
if (msg) {
  document.getElementById('flash').innerHTML = `<div class="flash"><i class="bi bi-check-circle"></i> ${msg}</div>`;
  sessionStorage.removeItem('kpi_flash');
  setTimeout(() => document.getElementById('flash').innerHTML='', 4000);
}

I18N.init();
refresh();
</script>
</body>
</html>
