<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOKEN KPI — Weekly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f18; --card: #141720; --border: #252840;
      --text: #dde2f0; --muted: #5a6488; --accent: #7c6af7;
      --pass: #4ade80; --warn: #fbbf24; --fail: #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; }
    a { color: var(--accent); text-decoration: none; }

    nav { background: var(--card); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1.25rem; position: sticky; top: 0; z-index: 100; }
    .brand { font-weight: 700; font-size: 1rem; color: var(--accent); letter-spacing: .04em; }
    .nav-links { display: flex; gap: .2rem; flex: 1; }
    .nav-links a { padding: .4rem .7rem; border-radius: 6px; font-size: .875rem; color: var(--muted); transition: all .15s; display: flex; align-items: center; gap: .35rem; }
    .nav-links a:hover, .nav-links a.active { background: #1e2235; color: var(--text); }
    .btn { display: inline-flex; align-items: center; gap: .35rem; padding: .4rem .8rem; border-radius: 7px; font-size: .8rem; border: 1px solid transparent; cursor: pointer; font-weight: 500; transition: all .15s; background: transparent; }
    .btn-ghost { color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); background: #1e2235; }
    .btn-lang { color: var(--muted); border-color: var(--border); font-weight: 600; min-width: 36px; justify-content: center; }
    .btn-lang:hover { color: var(--accent); border-color: var(--accent); background: #7c6af710; }
    .nav-end { display: flex; gap: .4rem; margin-left: auto; }

    .page { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .sec { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1rem; }

    .row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .col-l { flex: 5 1 280px; }
    .col-r { flex: 7 1 340px; }

    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .mini { background: #0d0f18; border-radius: 8px; padding: .6rem .9rem; }
    .mini-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .12rem; }
    .mini-val { font-size: 1.2rem; font-weight: 700; }
    .mini-note { font-size: .65rem; color: var(--muted); margin-top: .1rem; }

    label { font-size: .8rem; color: var(--muted); display: block; margin-bottom: .35rem; }
    input[type=number], input[type=text], textarea {
      width: 100%; background: #0d0f18; border: 1px solid var(--border);
      color: var(--text); padding: .55rem .75rem; border-radius: 8px; font-size: .875rem;
      transition: border-color .15s; outline: none; font-family: inherit;
    }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #7c6af718; }
    textarea { resize: vertical; min-height: 55px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }

    .btn-submit { background: var(--accent); color: #fff; border-color: var(--accent); padding: .55rem 1.3rem; font-size: .875rem; font-weight: 600; border-radius: 8px; }
    .btn-submit:hover { background: #6b58e8; }

    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; padding: .55rem .75rem; border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: .6rem .75rem; border-bottom: 1px solid #161828; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #161828; }

    .flash { background: #16a34a18; border: 1px solid #16a34a30; color: var(--pass); padding: .7rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .875rem; display: flex; align-items: center; gap: .5rem; }
    .empty { text-align: center; padding: 1.5rem; color: var(--muted); }

    .field-help { font-size:.71rem; color:var(--muted); margin-top:.28rem; line-height:1.55; white-space:pre-line; }

    @media (max-width: 560px) { .g3 { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<nav>
  <span class="brand"><i class="bi bi-graph-up-arrow"></i> TOKEN KPI</span>
  <div class="nav-links">
    <a href="index.html"><i class="bi bi-speedometer2"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
    <a href="log.html"><i class="bi bi-plus-circle"></i><span data-i18n="nav.log">記錄</span></a>
    <a href="weekly.html" class="active"><i class="bi bi-calendar-week"></i><span data-i18n="nav.weekly">週報</span></a>
  </div>
  <div class="nav-end">
    <button class="btn btn-lang" onclick="I18N.toggleLang()"><span data-i18n="nav.lang">EN</span></button>
  </div>
</nav>

<div class="page">
  <h1 style="font-size:1.25rem;font-weight:700;margin:0 0 1.25rem">
    <i class="bi bi-calendar-week" style="color:var(--accent);margin-right:.5rem"></i><span data-i18n="weekly.title">週報</span>
  </h1>

  <div id="flash"></div>

  <div class="row">
    <!-- Summary -->
    <div class="col-l card">
      <div class="sec" data-i18n="weekly.summary">本週自動彙整</div>
      <div id="summary-loading" style="color:var(--muted);font-size:.85rem" data-i18n="weekly.loading">計算中…</div>
      <div id="summary-content" style="display:none">
        <div style="font-size:.73rem;color:var(--muted);margin-bottom:.75rem" id="week-range"></div>
        <div class="mini-grid" id="core-metrics"></div>
        <div id="pge-section" style="display:none;margin-top:.75rem">
          <div class="sec" style="margin-bottom:.5rem" data-i18n="weekly.pge">PGE 流程指標</div>
          <div class="mini-grid" id="pge-metrics"></div>
        </div>
      </div>
      <div id="summary-empty" style="display:none;color:var(--muted);font-size:.85rem" data-i18n="weekly.no_data">本週尚無 session 資料</div>
    </div>

    <!-- Record -->
    <div class="col-r card">
      <div class="sec" data-i18n="weekly.record">記錄品質指標</div>
      <div class="g3">
        <div>
          <label data-i18n="weekly.bir">BIR — bugs / 1000 行</label>
          <input type="number" id="bir" data-i18n="weekly.bir.ph" data-i18n-attr="placeholder" placeholder="例：2.5" step="0.1" min="0">
          <div class="field-help" data-i18n="help.bir"></div>
        </div>
        <div>
          <label data-i18n="weekly.rr">RR — 重構率</label>
          <input type="number" id="rr" data-i18n="weekly.rr.ph" data-i18n-attr="placeholder" placeholder="0.0 ~ 1.0" step="0.01" min="0" max="1">
          <div class="field-help" data-i18n="help.rr"></div>
        </div>
        <div>
          <label data-i18n="weekly.ce">CE — Context 效率</label>
          <input type="number" id="ce" data-i18n="weekly.ce.ph" data-i18n-attr="placeholder" placeholder="0.0 ~ 1.0" step="0.01" min="0" max="1">
          <div class="field-help" data-i18n="help.ce"></div>
        </div>
      </div>
      <div style="margin-bottom:1rem">
        <label data-i18n="weekly.notes">本週備註</label>
        <textarea id="notes" data-i18n="weekly.notes.ph" data-i18n-attr="placeholder" placeholder="（選填）本週觀察、調整方向…"></textarea>
      </div>
      <button class="btn btn-submit" onclick="saveWeekly()">
        <i class="bi bi-save"></i> <span data-i18n="weekly.save">儲存週報</span>
      </button>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="sec" data-i18n="weekly.history">歷史週報</div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th data-i18n="weekly.col.week">週次</th>
            <th data-i18n="weekly.col.sess">Sessions</th>
            <th data-i18n="weekly.col.bir">BIR</th>
            <th data-i18n="weekly.col.rr">RR</th>
            <th data-i18n="weekly.col.ce">CE</th>
            <th data-i18n="weekly.col.notes">備註</th>
          </tr>
        </thead>
        <tbody id="history"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/kpi.js"></script>
<script src="js/i18n.js"></script>
<script>
function miniCard(label, val, suffix, note) {
  const display = val !== null
    ? (suffix === '%' ? (val*100).toFixed(1)+'%' : val.toFixed(2))
    : '—';
  return `<div class="mini">
    <div class="mini-label">${label}</div>
    <div class="mini-val">${display}</div>
    ${note ? `<div class="mini-note">${note}</div>` : ''}
  </div>`;
}

function loadSummary() {
  const s = KPI.getWeekSummary();
  document.getElementById('summary-loading').style.display = 'none';

  if (!s.total_sessions) {
    document.getElementById('summary-empty').style.display = '';
    return;
  }

  document.getElementById('summary-content').style.display = '';
  document.getElementById('week-range').textContent = `${s.week_start} ～ ${s.week_end}（${s.total_sessions} sessions）`;

  document.getElementById('core-metrics').innerHTML =
    miniCard('TCR',  s.avg_tcr,  '%', I18N.t('mini.tcr.note')) +
    miniCard('IC',   s.avg_ic,   '',  I18N.t('mini.ic.note'))  +
    miniCard('CAR',  s.avg_car,  '%', I18N.t('mini.car.note')) +
    miniCard('TTWC', s.avg_ttwc, '%', I18N.t('mini.ttwc.note'));

  if (s.has_pge) {
    document.getElementById('pge-section').style.display = '';
    document.getElementById('pge-metrics').innerHTML =
      miniCard('PA',  s.avg_pa,  '%', I18N.t('mini.pa.note')) +
      miniCard('ECR', s.avg_ecr, '%', I18N.t('mini.ecr.note')) +
      `<div class="mini"><div class="mini-label">${I18N.t('mini.hl')}</div><div class="mini-val">${s.avg_hl !== null ? s.avg_hl.toFixed(1) : '—'}</div></div>`;
  }
}

function loadHistory() {
  const data = KPI.getWeekly().slice().reverse();
  const tbody = document.getElementById('history');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty" data-i18n="weekly.empty">${I18N.t('weekly.empty')}</div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(w => {
    const rrVal = w.rr ? parseFloat(w.rr) : null;
    const rrColor = rrVal !== null ? (rrVal > 0.3 ? 'var(--fail)' : 'var(--pass)') : '';
    return `<tr>
      <td style="white-space:nowrap;color:var(--muted);font-size:.8rem">${w.week_start} ～ ${w.week_end}</td>
      <td>${w.total_sessions}</td>
      <td>${w.bir || '<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:${rrColor}">${rrVal !== null ? (rrVal*100).toFixed(0)+'%' : '<span style="color:var(--muted)">—</span>'}</td>
      <td>${w.ce ? (parseFloat(w.ce)*100).toFixed(0)+'%' : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:var(--muted);font-size:.78rem">${w.notes||''}</td>
    </tr>`;
  }).join('');
}

function saveWeekly() {
  const s = KPI.getWeekSummary();
  KPI.addWeekly({
    week_start: s.week_start, week_end: s.week_end,
    total_sessions: s.total_sessions,
    bir:   document.getElementById('bir').value,
    rr:    document.getElementById('rr').value,
    ce:    document.getElementById('ce').value,
    notes: document.getElementById('notes').value,
  });
  ['bir','rr','ce','notes'].forEach(id => document.getElementById(id).value = '');
  loadHistory();
  const f = document.getElementById('flash');
  f.innerHTML = `<div class="flash"><i class="bi bi-check-circle"></i> ${I18N.t('weekly.saved')}</div>`;
  setTimeout(() => f.innerHTML='', 3000);
}

// Re-render dynamic content on language change
function onLangChange() {
  loadSummary();
  loadHistory();
  I18N.applyAll();
}

I18N.init();
loadSummary();
loadHistory();
</script>
</body>
</html>
