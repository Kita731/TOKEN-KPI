<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TOKEN KPI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e2e8f0; }
    .navbar { background: #1a1d2e !important; border-bottom: 1px solid #2d3148; }
    .navbar-brand { font-weight: 700; letter-spacing: .05em; color: #7c6af7 !important; }
    .nav-link { color: #94a3b8 !important; }
    .nav-link.active, .nav-link:hover { color: #e2e8f0 !important; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; }
    .card-title { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; }
    .metric-value { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .badge-pass  { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .badge-warn  { background: #ca8a0422; color: #fbbf24; border: 1px solid #ca8a0444; }
    .badge-fail  { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
    .trend-up    { color: #4ade80; }
    .trend-down  { color: #f87171; }
    .trend-stable{ color: #64748b; }
    .table { color: #cbd5e1; }
    .table th { color: #64748b; font-size: .75rem; text-transform: uppercase; border-color: #2d3148; }
    .table td { border-color: #1e2235; }
    .table tbody tr:hover { background: #1e2235; }
    .form-control, .form-select {
      background: #0f1117; border-color: #2d3148; color: #e2e8f0;
    }
    .form-control:focus, .form-select:focus {
      background: #0f1117; border-color: #7c6af7; color: #e2e8f0;
      box-shadow: 0 0 0 3px #7c6af722;
    }
    .form-label { color: #94a3b8; font-size: .85rem; }
    .btn-primary { background: #7c6af7; border-color: #7c6af7; }
    .btn-primary:hover { background: #6b58e8; border-color: #6b58e8; }
    .alert-success { background: #16a34a22; border-color: #16a34a44; color: #4ade80; }
    .section-title { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: #475569; margin-bottom: 1rem; }
    .preview-val { font-size: 1.4rem; font-weight: 700; }
    .preview-pass { color: #4ade80; }
    .preview-warn { color: #fbbf24; }
    .preview-fail { color: #f87171; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/dashboard">
      <i class="bi bi-graph-up-arrow me-2"></i>TOKEN KPI
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'log_session' %}active{% endif %}" href="/log">
            <i class="bi bi-plus-circle me-1"></i>記錄 Session
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'weekly' %}active{% endif %}" href="/weekly">
            <i class="bi bi-calendar-week me-1"></i>週報
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle me-2"></i>{{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
